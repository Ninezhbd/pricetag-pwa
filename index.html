<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Tag</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F5F1E8; font-family: Arial; padding: 16px; color: #1E1E2E; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; font-size: 16px; }
        input { border: 1px solid #999; background: transparent; }
        button { border: 2px solid #1E1E2E; background: transparent; font-weight: bold; cursor: pointer; }
        .result { padding: 16px; border: 2px solid #1E1E2E; border-radius: 12px; margin-top: 16px; }
        .hidden { display: none; }
        h2 { margin: 16px 0 8px; }
        #ocrStatus { color: #666; font-size: 14px; text-align: center; margin: 8px 0; }
    </style>
</head>
<body>
    <div id="profileScreen">
        <h2>Настройка профиля</h2>
        <label>Зарплата в месяц (руб.):</label>
        <input id="salary" type="number" placeholder="80000">
        <label>Рабочих часов в месяц:</label>
        <input id="hours" type="number" value="160" placeholder="160">
        <label>Аренда:</label>
        <input id="rent" type="number" placeholder="25000">
        <label>Еда:</label>
        <input id="food" type="number" placeholder="15000">
        <label>Транспорт:</label>
        <input id="transport" type="number" placeholder="5000">
        <label>Кредиты:</label>
        <input id="debts" type="number" placeholder="10000">
        <button onclick="saveProfile()">Сохранить</button>
        <p id="profileMsg"></p>
    </div>

    <div id="calcScreen" class="hidden">
        <h2>Расчёт цены</h2>
        <p id="rateInfo"></p>
        <label>Цена товара (руб.):</label>
        <input id="price" type="number" placeholder="2999">
        <button onclick="calculate()">Рассчитать</button>
        <div id="resultBox" class="result hidden"></div>
        <button onclick="openCamera()">📸 Сканировать ценник</button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="onFileSelected(this)" class="hidden">
        <p id="ocrStatus" class="hidden">🔍 Распознаю цену...</p>
        <button onclick="showProfile()">⚙️ Изменить профиль</button>
    </div>

    <script>
        let profile = null;

        function saveProfile() {
            let s = +document.getElementById('salary').value;
            let h = +document.getElementById('hours').value;
            let r = +document.getElementById('rent').value || 0;
            let f = +document.getElementById('food').value || 0;
            let t = +document.getElementById('transport').value || 0;
            let d = +document.getElementById('debts').value || 0;
            if (!s || !h) { document.getElementById('profileMsg').innerText = 'Введите зарплату и часы!'; return; }
            let net = s * 0.87, expenses = r + f + t + d, free = net - expenses, rate = h > 0 ? free / h : 0;
            if (free <= 0) { document.getElementById('profileMsg').innerText = 'Расходы превышают доходы!'; return; }
            profile = { s, h, r, f, t, d, net, expenses, free, rate };
            document.getElementById('profileMsg').innerText = '✅ 1 час = ' + rate.toFixed(2) + ' руб.';
            document.getElementById('profileScreen').classList.add('hidden');
            document.getElementById('calcScreen').classList.remove('hidden');
            document.getElementById('rateInfo').innerText = 'Стоимость часа: ' + rate.toFixed(2) + ' руб.';
        }

        function showProfile() {
            document.getElementById('calcScreen').classList.add('hidden');
            document.getElementById('profileScreen').classList.remove('hidden');
        }

        function calculate(priceVal) {
            let price = priceVal || +document.getElementById('price').value;
            if (!profile || !price) return;
            document.getElementById('price').value = price;
            let hours = price / profile.rate, days = hours / 8, weeks = hours / 40;
            document.getElementById('resultBox').innerHTML =
                '<p><strong>💰 Цена:</strong> ' + price + ' руб.</p>' +
                '<p><strong>⏱ Часов жизни:</strong> ' + hours.toFixed(2) + '</p>' +
                '<p><strong>📅 Рабочих дней:</strong> ' + days.toFixed(1) + '</p>' +
                '<p><strong>📆 Рабочих недель:</strong> ' + weeks.toFixed(2) + '</p>' +
                '<p><em>«Ты готов отдать столько жизни за эту вещь?»</em></p>';
            document.getElementById('resultBox').classList.remove('hidden');
        }

        function openCamera() {
            document.getElementById('cameraInput').click();
        }

        async function onFileSelected(input) {
            if (!input.files || !input.files[0]) return;

            let status = document.getElementById('ocrStatus');
            status.classList.remove('hidden');
            status.innerText = '🔍 Распознаю цену...';

            try {
                let imageUrl = URL.createObjectURL(input.files[0]);
                
                // Запускаем OCR через Tesseract.js (русский + английский)
                let worker = await Tesseract.createWorker('rus+eng');
                let result = await worker.recognize(imageUrl);
                let text = result.data.text;
                await worker.terminate();
                URL.revokeObjectURL(imageUrl);

                // Ищем цену в тексте
                let price = extractPrice(text);
                
                if (price) {
                    status.innerText = '✅ Распознана цена: ' + price + ' руб.';
                    calculate(price);
                } else {
                    status.innerText = '❌ Цена не найдена. Введите вручную.';
                }
            } catch(e) {
                status.innerText = '❌ Ошибка распознавания. Введите вручную.';
            }
        }

        function extractPrice(text) {
            // Ищем цену в форматах: 2999, 2 999, 2999.99, 2999 руб, 2 999 ₽
            let patterns = [
                /(\d{1,3}(?:\s?\d{3})*(?:[.,]\d{2})?)\s*(?:руб|₽|rub|р)/i,
                /(?:руб|₽|rub|р)\s*(\d{1,3}(?:\s?\d{3})*(?:[.,]\d{2})?)/i,
                /(\d{2,5}(?:[.,]\d{2})?)/g
            ];

            for (let pattern of patterns) {
                let matches = text.matchAll(pattern);
                for (let match of matches) {
                    let value = match[1] || match[0];
                    value = value.replace(/\s/g, '').replace(',', '.');
                    let price = parseFloat(value);
                    if (price > 1 && price < 10000000) return price;
                }
            }
            return null;
        }
    </script>
</body>
</html>
